services:
  - type: web
    name: points-genie
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://points-genie.onrender.com
      - key: LLM_MODEL
        value: claude-sonnet-4-5-20250929
      - key: LOG_LEVEL
        value: INFO
